services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hivetrack
      POSTGRES_PASSWORD: hivetrack
      POSTGRES_DB: hivetrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivetrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment to run a local mail catcher (view sent emails at http://localhost:8025)
  # mailpit:
  #   image: axllent/mailpit:latest
  #   ports:
  #     - "1025:1025"   # SMTP
  #     - "8025:8025"   # Web UI

volumes:
  postgres_data:
