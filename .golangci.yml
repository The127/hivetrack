version: "2"

linters:
  enable:
    # Correctness
    - errcheck          # never ignore error returns
    - govet             # go vet checks
    - staticcheck       # SA*, QF*, S1* static analysis
    - ineffassign       # detect ineffectual assignments
    - unused            # unused code
    - nilerr            # return nil when err != nil
    - bodyclose         # HTTP response body must be closed
    - sqlclosecheck     # sql.Rows / sql.Stmt must be closed
    - contextcheck      # functions receiving context must pass it
    # Style / clarity
    - revive            # configurable linter replacing golint
    - misspell          # spelling in comments and strings
    - unconvert         # remove unnecessary type conversions
    - unparam           # unused function parameters
    - exhaustive        # exhaustive switch on enums
    # Security
    - gosec             # common security issues
    # Architecture (complements the architecture_test.go)
    - depguard          # restrict which packages can be imported where

  settings:
    revive:
      rules:
        - name: error-return
          severity: warning
        - name: blank-imports
          severity: error
        - name: context-as-argument
          severity: error        # ctx must be the first argument
        - name: context-keys-type
          severity: error        # no built-in types as context keys

    exhaustive:
      default-signifies-exhaustive: true

    gosec:
      excludes:
        - G104  # errors unhandled — covered by errcheck

    depguard:
      rules:
        no-direct-db-in-handlers:
          files:
            - "**/handlers/**"
          deny:
            - pkg: "database/sql"
              desc: "handlers must not use sql directly — use DbContext via IoC"
            - pkg: "github.com/lib/pq"
              desc: "handlers must not import the postgres driver"

  exclusions:
    rules:
      # Allow unused parameters in test files (common in table-driven tests)
      - path: "_test.go"
        linters:
          - unparam
      # Allow dot imports in test files (for testify etc.)
      - path: "_test.go"
        linters:
          - revive
        text: "dot-imports"
      # Architecture test file uses reflection-heavy code
      - path: "internal/architecture"
        linters:
          - exhaustive
          - unparam

formatters:
  enable:
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/the127/hivetrack
