name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hivetrack-ui/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: hivetrack/go.sum

      - name: Build frontend
        working-directory: hivetrack-ui
        run: |
          npm ci
          npm run build

      - name: Build backend binary
        working-directory: hivetrack
        run: CGO_ENABLED=0 GOOS=linux go build -o ../bin/hivetrack ./cmd/hivetrack

      - name: Build MCP binaries
        working-directory: mcp
        run: |
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o ../bin/hivetrack-mcp-linux-amd64   ./cmd/hivetrack-mcp
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ../bin/hivetrack-mcp-windows-amd64.exe ./cmd/hivetrack-mcp
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o ../bin/hivetrack-mcp-darwin-amd64  ./cmd/hivetrack-mcp
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o ../bin/hivetrack-mcp-darwin-arm64  ./cmd/hivetrack-mcp

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/hivetrack
            bin/hivetrack-mcp-linux-amd64
            bin/hivetrack-mcp-windows-amd64.exe
            bin/hivetrack-mcp-darwin-amd64
            bin/hivetrack-mcp-darwin-arm64
          generate_release_notes: true

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (hivetrack)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Docker metadata (hivetrack-mcp)
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push hivetrack image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}

      - name: Build and push hivetrack-mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
