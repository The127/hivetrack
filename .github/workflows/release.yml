name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-app:
    name: Build App (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hivetrack-ui/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: hivetrack/go.sum

      - name: Build frontend
        working-directory: hivetrack-ui
        run: |
          npm ci
          npm run build

      - name: Build backend binary
        working-directory: hivetrack
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o ../bin/hivetrack ./cmd/hivetrack

      - uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: bin/hivetrack

  build-mcp:
    name: Build MCP (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: ""
          - os: linux
            arch: arm64
            suffix: ""
          - os: darwin
            arch: amd64
            suffix: ""
          - os: darwin
            arch: arm64
            suffix: ""
          - os: windows
            arch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: mcp/go.sum

      - name: Build MCP binaries
        working-directory: mcp
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -ldflags "-X main.version=${{ github.ref_name }}" \
            -o ../bin/hivetrack-mcp-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }} \
            ./cmd/hivetrack-mcp

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/hivetrack-mcp-*

  release:
    name: Create Release
    needs: [build-app, build-mcp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Generate checksums
        working-directory: bin
        run: sha256sum * > checksums.txt

      - name: Create mcp/ prefixed tag
        run: |
          git tag "mcp/${{ github.ref_name }}" "${{ github.ref_name }}"
          git push origin "mcp/${{ github.ref_name }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/*
          generate_release_notes: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        working-directory: npm/hivetrack-mcp
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm publish --access public --provenance

      - name: Update Homebrew tap
        if: vars.HOMEBREW_TAP == 'true'
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          DARWIN_AMD64_SHA=$(grep 'hivetrack-mcp-darwin-amd64' bin/checksums.txt | awk '{print $1}')
          DARWIN_ARM64_SHA=$(grep 'hivetrack-mcp-darwin-arm64' bin/checksums.txt | awk '{print $1}')
          LINUX_AMD64_SHA=$(grep 'hivetrack-mcp-linux-amd64' bin/checksums.txt | awk '{print $1}')
          LINUX_ARM64_SHA=$(grep 'hivetrack-mcp-linux-arm64' bin/checksums.txt | awk '{print $1}')

          BASE_URL="https://github.com/The127/hivetrack/releases/download/${TAG}"

          FORMULA=$(cat <<FORMULA_EOF
          class HivetrackMcp < Formula
            desc "MCP server for Hivetrack task planning tool"
            homepage "https://github.com/The127/hivetrack"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/hivetrack-mcp-darwin-arm64"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "${BASE_URL}/hivetrack-mcp-darwin-amd64"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/hivetrack-mcp-linux-arm64"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "${BASE_URL}/hivetrack-mcp-linux-amd64"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              suffix = if OS.mac?
                Hardware::CPU.arm? ? "darwin-arm64" : "darwin-amd64"
              else
                Hardware::CPU.arm? ? "linux-arm64" : "linux-amd64"
              end
              bin.install "hivetrack-mcp-#{suffix}" => "hivetrack-mcp"
            end

            test do
              assert_match "hivetrack-mcp", shell_output("#{bin}/hivetrack-mcp --version", 0)
            end
          end
          FORMULA_EOF
          )

          gh repo clone The127/homebrew-tap /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula
          echo "$FORMULA" > /tmp/homebrew-tap/Formula/hivetrack-mcp.rb
          cd /tmp/homebrew-tap
          git add Formula/hivetrack-mcp.rb
          git commit -m "Update hivetrack-mcp to ${VERSION}"
          git push

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (hivetrack)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Docker metadata (hivetrack-mcp)
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push hivetrack image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}

      - name: Build and push hivetrack-mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
