<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer hex outline -->
  <path d="M60 8 L106 34.5 L106 87.5 L60 114 L14 87.5 L14 34.5 Z"
        stroke="#F59E0B" stroke-width="6" fill="none" stroke-linejoin="round" />

  <!-- Inner bee silhouette — simplified, geometric -->
  <!-- Body: small hex -->
  <path d="M60 38 L78 48.4 L78 69.2 L60 79.6 L42 69.2 L42 48.4 Z" fill="#F59E0B" />

  <!-- Stripes cut into the body -->
  <rect x="42" y="55" width="36" height="4" fill="white" opacity="0.4" />
  <rect x="42" y="63" width="36" height="4" fill="white" opacity="0.4" />

  <!-- Wings — two small leaf shapes -->
  <ellipse cx="34" cy="42" rx="10" ry="6" transform="rotate(-30 34 42)" fill="#F59E0B" opacity="0.5" />
  <ellipse cx="86" cy="42" rx="10" ry="6" transform="rotate(30 86 42)" fill="#F59E0B" opacity="0.5" />

  <!-- Antennae -->
  <line x1="54" y1="38" x2="44" y2="26" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" />
  <line x1="66" y1="38" x2="76" y2="26" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="43" cy="25" r="2.5" fill="#F59E0B" />
  <circle cx="77" cy="25" r="2.5" fill="#F59E0B" />
</svg>
