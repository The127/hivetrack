<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Hexagonal bee body -->
  <path d="M60 10 L103.3 35 L103.3 85 L60 110 L16.7 85 L16.7 35 Z" fill="#F59E0B" />

  <!-- Stripes on the hex body -->
  <path d="M26.5 55 L93.5 55 L97.8 62 L22.2 62 Z" fill="#292524" opacity="0.2" />
  <path d="M22.2 70 L97.8 70 L93.5 77 L26.5 77 Z" fill="#292524" opacity="0.2" />

  <!-- Wings — two rounded shapes poking out top-left and top-right -->
  <ellipse cx="30" cy="24" rx="16" ry="10" transform="rotate(-20 30 24)" fill="#FBBF24" opacity="0.7" />
  <ellipse cx="90" cy="24" rx="16" ry="10" transform="rotate(20 90 24)" fill="#FBBF24" opacity="0.7" />

  <!-- Eyes — two friendly dots -->
  <circle cx="45" cy="48" r="5" fill="#292524" opacity="0.6" />
  <circle cx="75" cy="48" r="5" fill="#292524" opacity="0.6" />

  <!-- Eye shine -->
  <circle cx="47" cy="46" r="1.8" fill="white" opacity="0.8" />
  <circle cx="77" cy="46" r="1.8" fill="white" opacity="0.8" />

  <!-- Tiny smile -->
  <path d="M50 58 Q60 66 70 58" stroke="#292524" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5" />

  <!-- Antenna stubs from top of hex -->
  <line x1="48" y1="12" x2="40" y2="2" stroke="#292524" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
  <line x1="72" y1="12" x2="80" y2="2" stroke="#292524" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
  <circle cx="39" cy="1" r="2.5" fill="#292524" opacity="0.5" />
  <circle cx="81" cy="1" r="2.5" fill="#292524" opacity="0.5" />
</svg>
