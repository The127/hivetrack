server:
  host: "0.0.0.0"
  port: 8081
  externalUrl: "http://localhost:8081"
  allowedOrigins:
    - "http://localhost:5173"
    - "http://localhost:5177"
    - "http://localhost:8080"

frontend:
  externalUrl: "http://localhost:5177"

database:
  mode: "postgres"
  postgres:
    host: "keyline-db"
    port: 5432
    username: "keyline"
    password: "keyline"
    sslMode: "disable"

initialVirtualServer:
  name: "hivetrack"
  displayName: "Hivetrack"
  enableRegistration: false
  signingAlgorithm: "EdDSA"
  createSystemAdminRole: true
  createAdmin: true
  admin:
    username: admin
    displayName: Admin
    # Default email — override with KEYLINE_INITIALVIRTUALSERVER_ADMIN_PRIMARYEMAIL
    primaryEmail: admin@hivetrack.local
    # Default password: "hivetrack" — change this before exposing to the internet
    passwordHash: "$argon2id$v=19$m=16,t=2,p=1$MTIzNDU2Nzg$QWu7e+sjG5knAdNLoKdLDg"
  projects:
    - slug: "hivetrack"
      name: "Hivetrack"
      description: "Hivetrack task planner"
      applications:
        - name: "hivetrack"
          displayName: "Hivetrack"
          type: "public"
          redirectUris:
            - "http://localhost:5173/auth/callback"
            - "http://localhost:8080/auth/callback"
          postLogoutRedirectUris:
            - "http://localhost:5173"
            - "http://localhost:8080"

keyStore:
  mode: "directory"
  directory:
    path: "./keys"

cache:
  mode: memory

leaderElection:
  mode: none
